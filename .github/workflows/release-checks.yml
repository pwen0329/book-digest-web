name: Release Checks

"on":
  push:
    branches:
      - main
      - 'release/**'
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-quality:
    name: Release Quality Gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Component tests
        run: npm run test:components

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: NEXT_DIST_DIR=.next-release npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Playwright Chromium
        run: CAPACITY_GUARDRAILS_E2E=1 BASE_URL=http://127.0.0.1:3000 npx playwright test --project=chromium

      - name: Playwright Firefox
        run: BASE_URL=http://127.0.0.1:3000 npx playwright test --project=firefox

      - name: Playwright WebKit
        run: BASE_URL=http://127.0.0.1:3000 npx playwright test --project=webkit

      - name: Playwright Mobile Chrome
        run: BASE_URL=http://127.0.0.1:3000 npx playwright test --project="Mobile Chrome"

      - name: Playwright Mobile Safari
        run: BASE_URL=http://127.0.0.1:3000 npx playwright test --project="Mobile Safari"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-playwright-report
          path: playwright-report/
          retention-days: 14